<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Test Three.js</title>
    <style>
        body { margin: 0; }
        #info { position: absolute; top: 10px; left: 10px; color: white; font-family: monospace; }
    </style>
</head>
<body>
    <div id="info">Loading...</div>
    <script type="module">
        const info = document.getElementById('info');
        try {
            const canvas = document.createElement('canvas');
            const gl = canvas.getContext('webgl2') || canvas.getContext('webgl');
            if (gl) {
                info.textContent = 'WebGL: ' + (gl instanceof WebGL2RenderingContext ? 'WebGL2' : 'WebGL1');
                info.style.color = '#0f0';
            } else {
                info.textContent = 'No WebGL';
                info.style.color = '#f00';
            }
        } catch(e) {
            info.textContent = 'Error: ' + e.message;
        }
    </script>
</body>
</html>
